name: Regression

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONPATH: "."
      MPLBACKEND: "Agg"
      OMP_NUM_THREADS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Check required regression fixtures
        run: |
          test -f data/cartpole_dqn_eps010_transitions.pkl
          test -f artifacts/cartpole_dqn_eps010_merkle.json
          test -f artifacts/minibatch_td_from_dataset.json
          test -f artifacts/one_step_update_artifact.json
          test -f artifacts/short_trace_update_artifact.json
          test -f artifacts/short_trace_seeded_artifact.json
          test -f models/offline_dqn_with_target_seed42_best.pt
          test -f artifacts/one_step_post_checkpoint.pt
          test -f artifacts/short_trace_work/step_1_post_synced_4_5_6_7.pt
          test -f artifacts/short_trace_seeded_work/step_1_post_synced_9_13_15_18.pt

      - name: Run full regression summary
        run: |
          python scripts/experiments/run_full_regression.py

      - name: Upload regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: |
            artifacts/regression_summary.json
            artifacts/regression_summary.md
            artifacts/full_regression/*.stdout.txt
            artifacts/full_regression/*.stderr.txt